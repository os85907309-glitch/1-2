<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            background-color: aqua;
            width:100%;
            font-size: 30px;
        }
        .mydiv{

        }
        button{
        color: white;
        background-color: rgb(255,100,100);
        padding: 2rem;
        margin: 1rem;
        border: none;
        cursor: pointer;
        }
        button:hover{
            background-color: pink;
        }

</head>
<body>
    <div class="mydiv">
        <label for="beomthink">id</label>

    <div>

    <button>로그인</button>

</html>
